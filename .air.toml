# .air.toml
# Static site dev loop:
# - Rebuild site output via scripts/build-site
# - Restart preview server via scripts/serve

root = "."
tmp_dir = "tmp"

[build]
cmd = "scripts/build-site && go build -o ./tmp/site ./cmd/site"
entrypoint = ["./tmp/site", "serve"]

include_ext = [
  "go",
  "html", "tpl", "tmpl",
  "css", "scss",
  "js", "ts",
  "md",
  "jpeg", "jpg", "gif", "png", "bmp", "svg", "webp", "ico"
]

exclude_dir = ["tmp", ".git", "vendor", "node_modules", "build"]
exclude_regex = ["_test\\.go"]
exclude_unchanged = true
delay = 100
stop_on_error = true

[log]
time = true
main_only = false

[screen]
clear_on_rebuild = true
keep_scroll = true

[misc]
clean_on_exit = false
